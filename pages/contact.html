<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문의 — Pixlit</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="logo">
      <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="1" y="3" width="11" height="9" rx="2" fill="white" opacity="0.95"/><rect x="6" y="7" width="11" height="9" rx="2" fill="white" opacity="0.45"/><path d="M3.5 8.5L6 11L9 7" stroke="#2563EB" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <span class="logo-name">Pix<span>lit</span></span>
    </a>
    <div class="nav-links">
      <a href="../index.html" class="nav-link" data-ko="도구" data-en="Tools">도구</a>
      <a href="about.html" class="nav-link" data-ko="소개" data-en="About">소개</a>
      <a href="contact.html" class="nav-link active" data-ko="문의" data-en="Contact">문의</a>
      <button class="nav-lang" onclick="toggleLang()" id="lang-btn">🌐 KO</button>
    </div>
  </nav>

  <main class="simple-page">
    <h1 data-ko="문의하기" data-en="Contact us">문의하기</h1>
    <p class="page-date" data-ko="버그 제보, 기능 제안, 기타 문의사항을 보내주세요." data-en="Report bugs, suggest features, or send us a message.">버그 제보, 기능 제안, 기타 문의사항을 보내주세요.</p>

    <p data-ko="버그를 발견하셨거나 새로운 기능을 제안하고 싶으신가요? 아래 양식을 통해 메시지를 보내주세요. 영어 문의도 환영합니다."
       data-en="Found a bug or have a feature idea? Send us a message using the form below. We read every message.">
      버그를 발견하셨거나 새로운 기능을 제안하고 싶으신가요? 아래 양식을 통해 메시지를 보내주세요. 영어 문의도 환영합니다.
    </p>

    <div class="contact-form" id="contact-form">
      <div class="form-group">
        <label class="form-label" for="contact-name" data-ko="이름" data-en="Name">이름</label>
        <input class="form-input" type="text" id="contact-name" data-placeholder-ko="홍길동" data-placeholder-en="Jane Smith" placeholder="홍길동" autocomplete="name" />
      </div>
      <div class="form-group">
        <label class="form-label" for="contact-email" data-ko="이메일" data-en="Email">이메일</label>
        <input class="form-input" type="email" id="contact-email" placeholder="name@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="contact-subject" data-ko="제목" data-en="Subject">제목</label>
        <input class="form-input" type="text" id="contact-subject"
          data-placeholder-ko="버그 제보: HEIC 변환 오류"
          data-placeholder-en="Bug report: HEIC conversion error"
          placeholder="버그 제보: HEIC 변환 오류" />
      </div>
      <div class="form-group">
        <label class="form-label" for="contact-message" data-ko="내용" data-en="Message">내용</label>
        <textarea class="form-textarea" id="contact-message"
          data-placeholder-ko="자세한 내용을 입력해 주세요..."
          data-placeholder-en="Please describe your issue or suggestion in detail..."
          placeholder="자세한 내용을 입력해 주세요..."></textarea>
      </div>
      <button class="btn-primary" style="width:auto;padding:11px 28px;position:relative" onclick="submitContact()">
        <span id="submit-label" data-ko="보내기" data-en="Send">보내기</span>
      </button>
      <div id="contact-success" style="display:none;padding:14px;background:#DCFCE7;border-radius:8px;color:#15803D;font-size:14px;font-weight:500;">
        <span data-ko="메시지가 전송되었습니다. 감사합니다!" data-en="Message sent. Thank you!">메시지가 전송되었습니다. 감사합니다!</span>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <a href="../index.html" class="logo" style="gap:7px">
        <div class="logo-icon" style="width:24px;height:24px;border-radius:6px"><svg width="14" height="14" viewBox="0 0 18 18" fill="none"><rect x="1" y="3" width="11" height="9" rx="2" fill="white" opacity="0.95"/><rect x="6" y="7" width="11" height="9" rx="2" fill="white" opacity="0.45"/></svg></div>
        <span class="logo-name" style="font-size:14px">Pix<span>lit</span></span>
      </a>
      <div class="footer-links">
        <a href="privacy.html" class="footer-link" data-ko="개인정보처리방침" data-en="Privacy policy">개인정보처리방침</a>
        <a href="terms.html" class="footer-link" data-ko="이용약관" data-en="Terms of use">이용약관</a>
        <a href="about.html" class="footer-link" data-ko="소개" data-en="About">소개</a>
        <a href="contact.html" class="footer-link" data-ko="문의" data-en="Contact">문의</a>
      </div>
      <div class="footer-copy">© 2025 Pixlit. All rights reserved.</div>
    </div>
  </footer>

  <script>
    const _lang = { current: localStorage.getItem('pixlit-lang') || 'ko' };

    function toggleLang() {
      _lang.current = _lang.current === 'ko' ? 'en' : 'ko';
      localStorage.setItem('pixlit-lang', _lang.current);
      applyLang();
    }

    function applyLang() {
      const l = _lang.current;
      document.getElementById('lang-btn').textContent = l === 'ko' ? '🌐 KO' : '🌐 EN';
      document.querySelectorAll('[data-ko]').forEach(el => {
        const val = el.getAttribute('data-' + l);
        if (val !== null) el.innerHTML = val;
      });
      document.querySelectorAll('[data-placeholder-ko]').forEach(el => {
        el.placeholder = el.getAttribute('data-placeholder-' + l);
      });
      document.title = l === 'ko' ? '문의 — Pixlit' : 'Contact — Pixlit';
    }

    function submitContact() {
      const name    = document.getElementById('contact-name').value.trim();
      const email   = document.getElementById('contact-email').value.trim();
      const message = document.getElementById('contact-message').value.trim();
      const l = _lang.current;

      if (!name || !email || !message) {
        alert(l === 'ko'
          ? '이름, 이메일, 내용을 모두 입력해 주세요.'
          : 'Please fill in your name, email, and message.');
        return;
      }

      // Formspree integration — replace YOUR_FORM_ID after setup
      // fetch('https://formspree.io/f/YOUR_FORM_ID', {
      //   method: 'POST',
      //   headers: { 'Content-Type': 'application/json' },
      //   body: JSON.stringify({
      //     name, email,
      //     subject: document.getElementById('contact-subject').value,
      //     message
      //   })
      // });

      document.getElementById('contact-success').style.display = 'block';
      document.getElementById('contact-form').querySelectorAll('input,textarea,button').forEach(el => el.disabled = true);
    }

    document.addEventListener('DOMContentLoaded', applyLang);
  </script>
</body>
</html>
