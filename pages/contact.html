<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>문의 — Pixlit</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="../index.html" class="logo">
      <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="1" y="3" width="11" height="9" rx="2" fill="white" opacity="0.95"/><rect x="6" y="7" width="11" height="9" rx="2" fill="white" opacity="0.45"/><path d="M3.5 8.5L6 11L9 7" stroke="#2563EB" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <span class="logo-name">Pix<span>lit</span></span>
    </a>
    <div class="nav-links">
      <a href="../index.html" class="nav-link">Tools</a>
      <a href="about.html" class="nav-link">About</a>
      <a href="contact.html" class="nav-link active">Contact</a>
    </div>
  </nav>

  <main class="simple-page">
    <h1>문의하기</h1>
    <p class="page-date">버그 제보, 기능 제안, 기타 문의사항을 보내주세요.</p>

    <p>버그를 발견하셨거나 새로운 기능을 제안하고 싶으신가요? 아래 양식을 통해 메시지를 보내주세요. 영어 문의도 환영합니다.</p>

    <div class="contact-form" id="contact-form">
      <div class="form-group">
        <label class="form-label" for="contact-name">이름 / Name</label>
        <input class="form-input" type="text" id="contact-name" placeholder="홍길동" autocomplete="name" />
      </div>
      <div class="form-group">
        <label class="form-label" for="contact-email">이메일 / Email</label>
        <input class="form-input" type="email" id="contact-email" placeholder="name@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="contact-subject">제목 / Subject</label>
        <input class="form-input" type="text" id="contact-subject" placeholder="버그 제보: HEIC 변환 오류" />
      </div>
      <div class="form-group">
        <label class="form-label" for="contact-message">내용 / Message</label>
        <textarea class="form-textarea" id="contact-message" placeholder="자세한 내용을 입력해 주세요..."></textarea>
      </div>
      <button class="btn-primary" style="width:auto;padding:11px 28px;position:relative" onclick="submitContact()">
        <span>보내기 / Send</span>
      </button>
      <div id="contact-success" style="display:none;padding:14px;background:#DCFCE7;border-radius:8px;color:#15803D;font-size:14px;font-weight:500;">
        메시지가 전송되었습니다. 감사합니다! / Message sent. Thank you!
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <a href="../index.html" class="logo" style="gap:7px">
        <div class="logo-icon" style="width:24px;height:24px;border-radius:6px"><svg width="14" height="14" viewBox="0 0 18 18" fill="none"><rect x="1" y="3" width="11" height="9" rx="2" fill="white" opacity="0.95"/><rect x="6" y="7" width="11" height="9" rx="2" fill="white" opacity="0.45"/></svg></div>
        <span class="logo-name" style="font-size:14px">Pix<span>lit</span></span>
      </a>
      <div class="footer-links">
        <a href="privacy.html" class="footer-link">개인정보처리방침</a>
        <a href="terms.html" class="footer-link">이용약관</a>
        <a href="about.html" class="footer-link">소개</a>
        <a href="contact.html" class="footer-link">문의</a>
      </div>
      <div class="footer-copy">© 2025 Pixlit. All rights reserved.</div>
    </div>
  </footer>

  <script>
    function submitContact() {
      const name    = document.getElementById('contact-name').value.trim();
      const email   = document.getElementById('contact-email').value.trim();
      const message = document.getElementById('contact-message').value.trim();

      if (!name || !email || !message) {
        alert('이름, 이메일, 내용을 모두 입력해 주세요.\nPlease fill in name, email and message.');
        return;
      }

      // Formspree or EmailJS integration point
      // Replace YOUR_FORM_ID with your Formspree form ID after setup
      // fetch('https://formspree.io/f/YOUR_FORM_ID', {
      //   method: 'POST',
      //   headers: { 'Content-Type': 'application/json' },
      //   body: JSON.stringify({ name, email,
      //     subject: document.getElementById('contact-subject').value,
      //     message })
      // });

      document.getElementById('contact-success').style.display = 'block';
      document.getElementById('contact-form').querySelectorAll('input,textarea,button').forEach(el => el.disabled = true);
    }
  </script>
</body>
</html>
